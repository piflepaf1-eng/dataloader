# ─────────────────────────────────────────────────────────────────────────────
# pyproject.toml — dino_loader confidentiality configuration examples
#
# Copy the relevant sections into your project's pyproject.toml.
# ─────────────────────────────────────────────────────────────────────────────

# ── Option A: per-confidentiality paths (new, recommended) ───────────────────
[tool.dino_loader.datasets.confidentialities]
# Each key is a confidentiality label; each value is the absolute path to
# that confidentiality's root on the HPC filesystem.
public     = "/lustre/datasets/public"
private    = "/lustre/datasets/private"
restricted = "/gpfs/restricted_data"

# ── Option B: legacy single-root (still supported, auto-creates conf mounts) ─
# Each sub-directory under `root` becomes a confidentiality automatically.
# Use this if all confidentialities live under the same parent directory.
#
# [tool.dino_loader.datasets]
# root = "/lustre/datasets"
# → automatically registers /lustre/datasets/public, /lustre/datasets/private, …


# ─────────────────────────────────────────────────────────────────────────────
# Third-party package — exposing confidentialities via entry points
# ─────────────────────────────────────────────────────────────────────────────
# In your corp-datasets package's pyproject.toml:
#
# [project.entry-points."dino_loader.confidentialities"]
# corp = "corp_datasets.confs:CONFIDENTIALITIES"
#
# And in corp_datasets/confs.py:
#
#   from pathlib import Path
#   CONFIDENTIALITIES = {
#       "corp_internal": Path("/lustre/corp/internal"),
#       "corp_secret":   Path("/lustre/corp/secret"),
#   }
#
# These are discovered automatically when `dino_loader.datasets` is imported.


# ─────────────────────────────────────────────────────────────────────────────
# Environment variable syntax
# ─────────────────────────────────────────────────────────────────────────────
# Each confidentiality can also be set via an env var:
#
#   export DINO_CONF_PUBLIC=/lustre/datasets/public
#   export DINO_CONF_PRIVATE=/lustre/datasets/private
#   export DINO_CONF_RESTRICTED=/gpfs/restricted_data
#
# Env vars take precedence over pyproject.toml for the same confidentiality
# name (env overrides TOML).  Actually: TOML is higher priority (see docs).
# Resolution order: programmatic > TOML > env > legacy root > default fallback.
